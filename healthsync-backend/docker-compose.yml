version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthsync-postgres
    environment:
      POSTGRES_DB: healthsync_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthsync_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthsync-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/healthsync_db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: password
      JWT_SECRET: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      JWT_EXPIRATION_MS: 3600000
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
